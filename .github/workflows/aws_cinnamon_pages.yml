name: Deploy Cinnamon Pages

on:
  push:
    branches:
      - main
  
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      - name: Install Dependencies
        run: npm ci

      - name: Create .env.production file
        run: |
          touch .env.production
          echo "VITE_AWS_API_BASE_URL=${{ secrets.VITE_AWS_API_BASE_URL }}" >> .env.production
          echo "VITE_AWS_API_VERSION_URL=${{ secrets.VITE_AWS_API_VERSION_URL }}" >> .env.production
          echo "VITE_API_KEY=${{ secrets.VITE_API_KEY }}" >> .env.production
          echo "VITE_S3_BUCKET_URL=${{ secrets.VITE_S3_BUCKET_URL }}" >> .env.production
          echo "VITE_ENABLE_MOCKS=false" >> .env.production

      - name: Run Tests
        run: npm run test:run
      
      - name: Build
        run: npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify Identity
        run: aws sts get-caller-identity

      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"